<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Campaigns</h2>
  <div class="badge bg-success fs-5" *ngIf="account">
    Emerald Account: ${{ account.funds }}
  </div>
</div>

<table class="table table-striped table-hover align-middle shadow-sm">
  <thead class="table-dark">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Keywords</th>
    <th>Bid</th>
    <th>Fund</th>
    <th>Town (Radius)</th>
    <th>Status</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let c of campaigns">
    <td>{{ c.id }}</td>
    <td>{{ c.name }}</td>
    <td>{{ c.keywords }}</td>
    <td>${{ c.bidAmount }}</td>
    <td>${{ c.campaignFund }}</td>
    <td>{{ c.town }} ({{ c.radius }}km)</td>
    <td>
        <span class="badge" [ngClass]="c.status ? 'bg-primary' : 'bg-secondary'">
          {{ c.status ? 'ON' : 'OFF' }}
        </span>
    </td>
    <td>
      <button class="btn btn-sm btn-warning me-2" (click)="onEdit(c)">Edit</button>
      <button class="btn btn-sm btn-danger" (click)="deleteCampaign(c.id)">Delete</button>
    </td>
  </tr>
  <tr *ngIf="campaigns.length === 0">
    <td colspan="8" class="text-center text-muted py-4">No campaigns found.</td>
  </tr>
  </tbody>
</table>
